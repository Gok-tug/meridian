name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, matching src/Meridian.Cli/Meridian.Cli.csproj"
        required: true
        type: string
      create_github_release:
        description: "Create v<version> GitHub release after NuGet publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: nuget-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate version input
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$') {
            Write-Error "Version '$version' must be a SemVer prerelease such as 0.6.0-alpha.2."
            exit 1
          }

      - name: Validate project version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "src/Meridian.Cli/Meridian.Cli.csproj"
          $projectVersion = $project.Project.PropertyGroup.Version
          $inputVersion = "${{ inputs.version }}"
          if ($projectVersion -ne $inputVersion) {
            Write-Error "Project version '$projectVersion' does not match release input '$inputVersion'."
            exit 1
          }
          Write-Host "Validated package version $projectVersion."

      - name: Restore
        run: dotnet restore Meridian.CI.slnf

      - name: Build
        run: dotnet build Meridian.CI.slnf --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test Meridian.CI.slnf --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        run: dotnet format Meridian.CI.slnf --verify-no-changes --no-restore

      - name: Vulnerability check
        shell: pwsh
        run: |
          $json = dotnet list Meridian.CI.slnf package --vulnerable --include-transitive --format json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $report = $json | ConvertFrom-Json
          $vulnerablePackages = @()
          foreach ($project in @($report.projects)) {
            foreach ($framework in @($project.frameworks)) {
              foreach ($package in @($framework.topLevelPackages) + @($framework.transitivePackages)) {
                if ($null -ne $package -and $null -ne $package.vulnerabilities -and @($package.vulnerabilities).Count -gt 0) {
                  $vulnerablePackages += "$($project.path): $($package.id) $($package.resolvedVersion)"
                }
              }
            }
          }
          if ($vulnerablePackages.Count -gt 0) {
            $vulnerablePackages | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "No vulnerable packages found."

      - name: Pack CLI tool
        run: dotnet pack src/Meridian.Cli/Meridian.Cli.csproj --configuration Release --no-build --output artifacts/package

      - name: Validate package artifact
        shell: pwsh
        run: |
          $packagePath = "artifacts/package/meridian.${{ inputs.version }}.nupkg"
          if (-not (Test-Path $packagePath)) {
            Write-Error "Expected package '$packagePath' was not created."
            Get-ChildItem "artifacts/package" | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          $packages = @(Get-ChildItem "artifacts/package" -Filter "*.nupkg")
          if ($packages.Count -ne 1) {
            Write-Error "Expected exactly one .nupkg artifact, found $($packages.Count)."
            $packages | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "Validated package artifact $packagePath."

      - name: Local tool smoke test
        shell: pwsh
        run: |
          $toolSmokePath = "artifacts/tool-smoke"
          New-Item -ItemType Directory -Force -Path $toolSmokePath | Out-Null
          $localPackageSource = (Resolve-Path "artifacts/package").Path
          $nugetConfigPath = Join-Path $toolSmokePath "NuGet.config"
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="$localPackageSource" />
            </packageSources>
          </configuration>
          "@ | Set-Content $nugetConfigPath -Encoding utf8
          dotnet tool install meridian --tool-path $toolSmokePath --configfile $nugetConfigPath --version "${{ inputs.version }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $meridian = Join-Path $toolSmokePath "meridian"
          & $meridian --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $meridian mcp --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generated artifact hygiene check
        shell: pwsh
        run: |
          $status = git status --short
          if (-not [string]::IsNullOrWhiteSpace($status)) {
            Write-Error "Generated files changed the working tree:"
            $status | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "Working tree stayed clean."

      - name: Prepare GitHub release notes
        if: ${{ inputs.create_github_release }}
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $escapedVersion = [regex]::Escape($version)
          $headingPattern = "^##\s+v?$escapedVersion(\s|$|—|-)"
          $lines = @(Get-Content "CHANGELOG.md")
          $start = -1

          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $headingPattern) {
              $start = $i
              break
            }
          }

          if ($start -lt 0) {
            Write-Error "CHANGELOG.md does not contain a release section for version '$version'."
            exit 1
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^##\s+') {
              $end = $i
              break
            }
          }

          $content = (($lines[$start..($end - 1)]) -join [Environment]::NewLine).Trim()
          if ([string]::IsNullOrWhiteSpace($content)) {
            Write-Error "Release notes for version '$version' are empty."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Set-Content -Path "artifacts/release-notes.md" -Value $content -Encoding utf8
          Write-Host "Prepared release notes for $version."

      - name: Publish to NuGet
        run: dotnet nuget push "artifacts/package/meridian.${{ inputs.version }}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json"

      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" "artifacts/package/meridian.${{ inputs.version }}.nupkg" --title "v${{ inputs.version }}" --notes-file artifacts/release-notes.md
